<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shree ka Quiz 🤍</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:wght@300;400;500&family=Pinyon+Script&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0f0c0a;
    min-height: 100vh;
    font-family: 'DM Sans', sans-serif;
    color: white;
    padding: 0;
  }

  .screen {
    display: none;
    min-height: 100vh;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
    text-align: center;
  }
  .screen.active { display: flex; }

  /* COVER */
  .cover-screen {
    background: linear-gradient(160deg, #1a1208 0%, #0f0c0a 60%);
    position: relative;
    overflow: hidden;
  }

  .cover-screen::before {
    content: '';
    position: absolute;
    width: 400px; height: 400px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(196,116,138,0.1) 0%, transparent 70%);
    top: -100px; left: 50%; transform: translateX(-50%);
  }

  .cover-eyebrow {
    font-size: 10px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: rgba(184,154,106,0.6);
    margin-bottom: 24px;
  }

  .cover-title {
    font-family: 'Pinyon Script', cursive;
    font-size: clamp(56px, 15vw, 90px);
    color: white;
    line-height: 1;
    margin-bottom: 8px;
  }

  .cover-sub {
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px;
    font-style: italic;
    color: rgba(255,255,255,0.45);
    margin-bottom: 48px;
  }

  .cover-desc {
    font-size: 14px;
    line-height: 1.8;
    color: rgba(255,255,255,0.5);
    max-width: 320px;
    margin-bottom: 40px;
  }

  .btn-primary {
    background: rgba(196,116,138,0.15);
    border: 1px solid rgba(196,116,138,0.4);
    color: #e8a0b0;
    padding: 14px 40px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    letter-spacing: 3px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.3s ease;
  }
  .btn-primary:hover {
    background: rgba(196,116,138,0.25);
    transform: translateY(-2px);
  }

  /* QUIZ */
  .quiz-screen {
    background: #0f0c0a;
    justify-content: flex-start;
    padding-top: 48px;
  }

  .quiz-inner {
    width: 100%;
    max-width: 560px;
  }

  .progress-bar-wrap {
    width: 100%;
    height: 2px;
    background: rgba(255,255,255,0.06);
    margin-bottom: 40px;
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(to right, #c4748a, #b89a6a);
    transition: width 0.5s ease;
    border-radius: 2px;
  }

  .q-number {
    font-size: 10px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: rgba(184,154,106,0.5);
    margin-bottom: 16px;
  }

  .q-text {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(22px, 5vw, 32px);
    font-weight: 300;
    line-height: 1.3;
    color: white;
    margin-bottom: 36px;
    text-align: left;
  }

  .options {
    display: flex;
    flex-direction: column;
    gap: 12px;
    width: 100%;
  }

  .option {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.08);
    padding: 16px 20px;
    text-align: left;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: rgba(255,255,255,0.7);
    cursor: pointer;
    transition: all 0.25s ease;
    border-radius: 1px;
  }
  .option:hover:not(.disabled) {
    border-color: rgba(196,116,138,0.4);
    color: white;
    background: rgba(196,116,138,0.06);
  }
  .option.correct {
    border-color: rgba(134,196,116,0.6);
    background: rgba(134,196,116,0.08);
    color: #a8e8a0;
  }
  .option.wrong {
    border-color: rgba(196,116,134,0.6);
    background: rgba(196,116,134,0.08);
    color: #e8a0a0;
  }
  .option.disabled { cursor: default; pointer-events: none; }

  .feedback {
    margin-top: 20px;
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px;
    font-style: italic;
    min-height: 28px;
    color: rgba(255,255,255,0.6);
    text-align: left;
  }

  .next-btn {
    margin-top: 28px;
    background: transparent;
    border: 1px solid rgba(184,154,106,0.3);
    color: rgba(184,154,106,0.7);
    padding: 12px 32px;
    font-size: 12px;
    letter-spacing: 3px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.3s ease;
    display: none;
  }
  .next-btn.visible { display: inline-block; }
  .next-btn:hover { border-color: rgba(184,154,106,0.7); color: #c9a96e; }

  /* RESULT */
  .result-screen {
    background: linear-gradient(160deg, #1a1208 0%, #0f0c0a 60%);
  }

  .result-title {
    font-family: 'Pinyon Script', cursive;
    font-size: clamp(52px, 14vw, 84px);
    color: white;
    line-height: 1;
    margin-bottom: 16px;
  }

  .result-score {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(48px, 12vw, 72px);
    color: #e8a0b0;
    line-height: 1;
    margin-bottom: 8px;
  }

  .result-label {
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.3);
    margin-bottom: 32px;
  }

  .result-msg {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(18px, 4vw, 24px);
    font-style: italic;
    color: rgba(255,255,255,0.65);
    max-width: 400px;
    line-height: 1.7;
    margin-bottom: 40px;
  }

  .result-sign {
    font-family: 'Pinyon Script', cursive;
    font-size: 42px;
    color: #e8a0b0;
  }
</style>
</head>
<body>

<!-- COVER -->
<div class="screen cover-screen active" id="coverScreen">
  <p class="cover-eyebrow">01 July 2026 · 1 Year</p>
  <h1 class="cover-title">Shree ka Quiz</h1>
  <p class="cover-sub">How well do you know us?</p>
  <p class="cover-desc">10 questions. Sirf sach. Dekho kitna yaad hai tumhe hamara — aur kitna Sarthak tumhare dil mein hai 🤍</p>
  <button class="btn-primary" onclick="startQuiz()">Shuru Karo ✦</button>
</div>

<!-- QUIZ -->
<div class="screen quiz-screen" id="quizScreen">
  <div class="quiz-inner">
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progressBar" style="width:0%"></div>
    </div>
    <p class="q-number" id="qNumber">Question 1 of 10</p>
    <p class="q-text" id="qText"></p>
    <div class="options" id="optionsContainer"></div>
    <p class="feedback" id="feedback"></p>
    <button class="next-btn" id="nextBtn" onclick="nextQuestion()">Aage →</button>
  </div>
</div>

<!-- RESULT -->
<div class="screen result-screen" id="resultScreen">
  <h1 class="result-title" id="resultTitle">Shree</h1>
  <p class="result-score" id="resultScore"></p>
  <p class="result-label">out of 10</p>
  <p class="result-msg" id="resultMsg"></p>
  <p class="result-sign">— Sarthak 🤍</p>
</div>

<script>
const questions = [
  {
    q: "Kahan mile the hum pehli baar?",
    options: ["Tinder pe", "Ek random Instagram group chat mein", "Twitter pe", "Common friend ke through"],
    correct: 1,
    right: "Haan! Ek random group chat — jahan life partner milne ke 0% chances hote hain 😭🤍",
    wrong: "Ek random Instagram group chat mein — fate ne kuch aur socha tha 🤍"
  },
  {
    q: "Sarthak tumhe sabse pyaara naam kya bulata hai?",
    options: ["Jaan", "Meri Gulabjamun 😭", "Baby", "Shona"],
    correct: 1,
    right: "GULABJAMUN 😭 Tum jaanti thi na — tumhara hi toh naam hai ye 🤍",
    wrong: "Meri Gulabjamun! Sirf tumhara hi toh naam hai ye 😭🤍"
  },
  {
    q: "2 August 2025 ko exactly kitne baje tumne 'I love you too' kaha tha?",
    options: ["11:45 PM", "00:13", "01:30 AM", "00:30"],
    correct: 1,
    right: "00:13 🥹 Sarthak ko ye time zindagi bhar yaad rahega.",
    wrong: "00:13 — Sarthak ko ye waqt aaj bhi exactly yaad hai 🥹"
  },
  {
    q: "Tumhari sabse favourite cheez kaun hai? 😏",
    options: ["Chole Bhature", "Sarthak 😭", "Sleep", "Instagram"],
    correct: 1,
    right: "Obviously Sarthak 😭🤍 Sahi jawab!",
    wrong: "SARTHAK 😭🤍 — ye toh tumhe pata hona chahiye tha!"
  },
  {
    q: "December mein Sarthak raat ko bahar kyun jaata tha?",
    options: ["Walk pe jaana tha", "Dahi lene ke bahane tumse baat karne", "Kaam tha", "Friends ke saath milne"],
    correct: 1,
    right: "Itni thand mein bhi — sirf teri awaaz ke liye 😭🤍",
    wrong: "Dahi ke bahane — sirf tumhari awaaz sunne ke liye. Itni thand mein bhi 😭🤍"
  },
  {
    q: "28 July 2025 ka din Sarthak ke liye itna khaas kyun tha?",
    options: ["Uska birthday tha", "Tum breakup ke baad wapas aayi thi", "Pehli baar baat hui thi", "Pehli video call thi"],
    correct: 1,
    right: "Tum wapas aayi thi — aur usdin ki khushi ka koi jawab nahi 🥹🤍",
    wrong: "Tum wapas aayi thi us din — aur Sarthak ko nahi lagta tha ki tum aogi 🥹"
  },
  {
    q: "Tumhara aur Sarthak ka ek saath gaaya hua song kaun sa hai?",
    options: ["Tum Hi Ho", "Dekha Hazaro Dafa", "Tera Ban Jaunga", "Raabta"],
    correct: 1,
    right: "Dekha Hazaro Dafa 🎵 — teri awaaz, uski awaaz, ek saath. Vo memory ab is song mein hai 🤍",
    wrong: "Dekha Hazaro Dafa — call pe saath gaaya tha tumne. Vo memory ab us song mein hai 🎵🤍"
  },
  {
    q: "Sarthak ne pehli baar kisi ke liye kaunsa song gaaya tha — aur vo 'koi' kaun thi?",
    options: ["Tum Hi Ho — kisi aur ke liye", "Dooron Dooron — Shree ke liye 🤍", "Kaun Tujhe — Shree ke liye", "Pehle kabhi gaaya nahi"],
    correct: 1,
    right: "Dooron Dooron — pehli baar, sirf tumhare liye 😭🤍",
    wrong: "Dooron Dooron Unplugged — pehli baar kisi ke liye gaaya, aur vo tum thi 😭🤍"
  },
  {
    q: "Sarthak tumhe 'Shree' kyun bulata hai?",
    options: ["Ek random nickname hai", "Kyunki tum 'Mere Ghar Ki Lakshmi' ho 🤍", "Tumne khud kaha tha", "Bahut log bulate hain isliye"],
    correct: 1,
    right: "Mere Ghar Ki Lakshmi 🥹 Sirf Sarthak ne tumhe ye naam diya hai — apne dil se 🤍",
    wrong: "Kyunki tum uke liye 'Mere Ghar Ki Lakshmi' ho — ye naam sirf usne diya hai, apne dil se 🥹🤍"
  },
  {
    q: "April 2026 ke baad Sarthak itna khush kyun tha?",
    options: ["Koi achhi news aayi thi", "Usne feel kiya ki tum finally usse truly dekh rahi ho", "Exams khatam hue the", "Tumse pehli baar baat hui thi"],
    correct: 1,
    right: "Haan 🥹 Usne feel kiya ki tum uske efforts, uska pyaar — sab dekh rahi ho. Vo khushi alag hi thi 🤍",
    wrong: "April mein usne feel kiya ki tum finally usse truly dekh rahi ho — uske efforts, uski feelings, sab kuch 🥹🤍"
  }
];

let current = 0;
let score = 0;
let answered = false;

function startQuiz() {
  document.getElementById('coverScreen').classList.remove('active');
  document.getElementById('quizScreen').classList.add('active');
  loadQuestion();
}

function loadQuestion() {
  answered = false;
  const q = questions[current];
  document.getElementById('qNumber').textContent = `Question ${current + 1} of ${questions.length}`;
  document.getElementById('qText').textContent = q.q;
  document.getElementById('feedback').textContent = '';
  document.getElementById('nextBtn').classList.remove('visible');
  document.getElementById('progressBar').style.width = `${(current / questions.length) * 100}%`;

  const container = document.getElementById('optionsContainer');
  container.innerHTML = '';
  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option';
    btn.textContent = opt;
    btn.onclick = () => selectAnswer(i);
    container.appendChild(btn);
  });
}

function selectAnswer(index) {
  if (answered) return;
  answered = true;
  const q = questions[current];
  const options = document.querySelectorAll('.option');
  options.forEach(o => o.classList.add('disabled'));

  if (index === q.correct) {
    options[index].classList.add('correct');
    score++;
    document.getElementById('feedback').textContent = q.right;
  } else {
    options[index].classList.add('wrong');
    options[q.correct].classList.add('correct');
    document.getElementById('feedback').textContent = q.wrong;
  }
  document.getElementById('nextBtn').classList.add('visible');
}

function nextQuestion() {
  current++;
  if (current >= questions.length) {
    showResult();
  } else {
    loadQuestion();
  }
}

function showResult() {
  document.getElementById('quizScreen').classList.remove('active');
  document.getElementById('resultScreen').classList.add('active');
  document.getElementById('resultScore').textContent = `${score}/10`;

  let title, msg;
  if (score === 10) {
    title = "Perfect, Shree 🥹";
    msg = "10 out of 10. Tumhe sab yaad hai — sab kuch. Ye prove karta hai ki ye sirf ek relationship nahi, ye ek story hai jo tumne dono ne milke likhi hai. Happy Anniversary, meri Shree. 🤍";
  } else if (score >= 7) {
    title = "Meri Gulabjamun 😭";
    msg = `${score}/10 — almost perfect. Jo chhoot gaya vo dates thi, par jo nahi chhuta vo pyaar tha. Aur wo sab kuch hai. Happy Anniversary 🤍`;
  } else if (score >= 5) {
    title = "Shree... 😄";
    msg = `${score}/10 — theek hai, dates bhool gayi thi par dil sahi jagah hai. Sarthak tujhse bahut pyaar karta hai — anniversary mubarak ho 🤍`;
  } else {
    title = "Aye Shona 😭";
    msg = `${score}/10 — par koi baat nahi. Score se pyaar nahi napa jaata. Aur tumhara pyaar toh 10/10 hai hamesha 🤍 Happy Anniversary!`;
  }

  document.getElementById('resultTitle').textContent = title;
  document.getElementById('resultMsg').textContent = msg;
}
</script>
</body>
</html>
